<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Browser JDT LS</title>
		<script src="teavm/classes.wasm-runtime.js"></script>
	</head>
	<body>
		<script>
			globalThis.browserJdtLsReady = TeaVM.wasmGC.load("teavm/classes.wasm", {
				stackDeobfuscator: { enabled: false }
			}).then((teavm) => {
				globalThis.teavm = teavm;
				teavm.exports.main([]);
				const api = {
					lint(uri, source) {
						return teavm.exports.lint(uri, source);
					},
					handle(payload) {
						return teavm.exports.handle(payload);
					}
				};
				globalThis.browserJdtLs = api;
				if (globalThis.postMessage) {
					globalThis.onmessage = (event) => {
						const data = event.data || {};
						if (data.kind === "jdtls-lsp") {
							globalThis.postMessage({
								kind: "jdtls-lsp",
								response: api.handle(JSON.stringify(data.message))
							});
						}
					};
				}
				return api;
			});
		</script>
	</body>
</html>
